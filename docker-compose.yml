services:
  arxiv-daily-researcher:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: arxiv-daily-researcher:latest
    container_name: arxiv-daily-researcher
    restart: unless-stopped

    stdin_open: true
    tty: true

    # 使用宿主机网络，使容器可直接访问 localhost 上的本地 LLM API 等服务
    network_mode: host

    env_file:
      - .env

    environment:
      - TZ=Asia/Shanghai
      - CRON_SCHEDULE=0 1 * * *
      - RUN_ON_STARTUP=false
      - MODE=cron
      - SETUP_WIZARD=auto

    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./configs:/app/configs
      - ./.env:/app/.env

    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

    healthcheck:
      test: [ "CMD", "python", "-c", "import sys; sys.path.insert(0,'src'); import config; print('OK')" ]
      interval: 5m
      timeout: 10s
      retries: 3
      start_period: 30s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==================== Config Panel (Web UI) ====================
  config-panel:
    build:
      context: .
      dockerfile: docker/Dockerfile.webui
    image: arxiv-daily-researcher-config-panel:latest
    container_name: arxiv-daily-researcher-config-panel
    restart: unless-stopped

    ports:
      - "8501:8501"

    env_file:
      - .env

    environment:
      - TZ=Asia/Shanghai

    volumes:
      - ./configs:/app/configs
      - ./.env:/app/.env
      - ./.env.example:/app/.env.example:ro
      - ./data:/app/data
      - ./logs:/app/logs

    deploy:
      resources:
        limits:
          memory: 300M
        reservations:
          memory: 128M

    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
